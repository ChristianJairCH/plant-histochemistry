on:
  workflow_dispatch:
  push:
    branches: main

name: Publish Quarto Manuscript

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R (si usas R)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - name: Install R dependencies (si usas R)
        uses: r-lib/actions/setup-renv@v2

      - name: Install LaTeX (necesario para manuscript)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Render Quarto Manuscript
        run: quarto render --to html

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: _manuscript/  # ← IMPORTANTE: Especificar esta ruta

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2